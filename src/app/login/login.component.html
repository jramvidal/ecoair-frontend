<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Bienvenido a EcoAir</mat-card-title>
      <mat-card-subtitle>Inicia sesión para ver tus alertas de salud</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="login-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correo electrónico</mat-label>
          <input matInput 
                 type="email" 
                 name="email" 
                 [(ngModel)]="loginData.email" 
                 required 
                 placeholder="ejemplo@correo.com">
          <mat-icon matSuffix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput 
                 type="password" 
                 name="password" 
                 [(ngModel)]="loginData.password" 
                 required>
          <mat-icon matSuffix>lock</mat-icon>
        </mat-form-field>

        <button mat-raised-button 
                color="primary" 
                class="full-width login-button" 
                type="submit" 
                [disabled]="!loginForm.valid">
          ENTRAR
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer>
      <p class="register-text">
        ¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a>
      </p>
    </mat-card-footer>
  </mat-card>
</div>
