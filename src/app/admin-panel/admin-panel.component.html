<div class="main-container">
  <div class="centered-content">
    <header class="page-header">
      <div class="title-group">
        <mat-icon class="title-icon">settings</mat-icon>
        <h2>Panel de Administración</h2>
      </div>
      <p class="subtitle">Configuración global del sistema EcoAir.</p>
    </header>

    <mat-card class="admin-card">
      <mat-card-header>
        <mat-card-title>Sincronización</mat-card-title>
        <mat-card-subtitle
          >Frecuencia: <strong>{{ cronFrequency }}</strong></mat-card-subtitle
        >
      </mat-card-header>

      <mat-card-content class="admin-content">
        <div class="button-group">
          <button
            mat-raised-button
            color="warn"
            (click)="setCron(2)"
            [disabled]="loading"
          >
            <mat-icon>speed</mat-icon> Prueba (2 min)
          </button>
          <button
            mat-raised-button
            color="primary"
            (click)="setCron(60)"
            [disabled]="loading"
          >
            <mat-icon>schedule</mat-icon> Producción (1 h)
          </button>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="admin-card">
      <mat-card-header>
        <mat-card-title>Umbrales de Alerta</mat-card-title>
      </mat-card-header>

      <mat-card-content class="admin-content">
        <div class="table-container">
          <table class="responsive-table">
            <thead>
              <tr>
                <th>Condición</th>
                <th>AQI Mín</th>
                <th>Mensaje</th>
                <th class="text-center">Acción</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let t of thresholds" class="responsive-tr">
                <td class="cell-condition">
                  <span class="mobile-label">Condición:</span>
                  <div class="condition-info">
                    <span class="main-text">{{ t.condition }}</span>
                    <span class="sub-text">{{ t.sensitivity }}</span>
                  </div>
                </td>

                <td class="cell-aqi">
                  <span class="mobile-label">AQI Mínimo:</span>
                  <input
                    type="number"
                    [(ngModel)]="t.min_aqi"
                    class="admin-input aqi-input"
                  />
                </td>

                <td class="cell-message">
                  <span class="mobile-label">Mensaje de Alerta:</span>
                  <input
                    type="text"
                    [(ngModel)]="t.message_template"
                    class="admin-input msg-input"
                  />
                </td>

                <td class="cell-action text-center">
                  <button
                    mat-flat-button
                    color="primary"
                    (click)="updateThreshold(t)"
                    class="mobile-save-btn"
                  >
                    <mat-icon>save</mat-icon> <span>Guardar Cambios</span>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </mat-card-content>
    </mat-card>

    <div class="spacer"></div>
  </div>
</div>
